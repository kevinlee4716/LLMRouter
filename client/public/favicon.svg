<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Hexagonal routing ring -->
  <polygon points="32,8 52,20 52,44 32,56 12,44 12,20"
           fill="none" stroke="url(#ring)" stroke-width="2.5"
           stroke-linejoin="round" filter="url(#glow)" opacity="0.9"/>
  <!-- Inner routing path: zigzag representing smart routing -->
  <path d="M20 28 L28 22 L28 32 L36 26 L36 36 L44 30"
        fill="none" stroke="url(#bolt)" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Node dots at path endpoints -->
  <circle cx="20" cy="28" r="2.5" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="44" cy="30" r="2.5" fill="#a855f7" filter="url(#glow)"/>
</svg>
